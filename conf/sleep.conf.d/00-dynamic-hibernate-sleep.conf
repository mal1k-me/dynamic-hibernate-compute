#
# Drop-in for /etc/systemd/sleep.conf.d/
# Enables hibernation and configures suspend-then-hibernate.

[Sleep]
AllowHibernation=yes
AllowSuspendThenHibernate=yes

# s2idle (S0ix) is the correct suspend mode for Alder Lake / Tiger Lake
# platforms where S3 is deprecated by firmware.
SuspendState=freeze

# HibernateDelaySec: how long to stay in s2idle before triggering hibernate.
# Adjust to taste. 30 min is a sensible default for laptop battery protection.
# The prepare service fires at the transition point — with frozen workset —
# giving the tightest possible swapfile size estimate.
HibernateDelaySec=30min
