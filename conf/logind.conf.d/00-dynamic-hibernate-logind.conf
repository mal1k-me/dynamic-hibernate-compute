#
# Drop-in for systemd-logind.service
# Install to: /etc/systemd/system/systemd-logind.service.d/
#
# logind performs a pre-hibernation memory check that verifies enough swap
# is available *before* our prepare service runs. Since the swapfile is
# created dynamically at hibernate time, this check always fails without
# this bypass.
#
# This is safe because dynamic-hibernate-prepare.service performs its own
# rigorous space check (btrfs free bytes vs. computed swapfile size) and
# aborts with a D-Bus error signal if it cannot proceed.

[Service]
Environment=SYSTEMD_BYPASS_HIBERNATION_MEMORY_CHECK=1
