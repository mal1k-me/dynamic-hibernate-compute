<!--
  Install to: /usr/share/dbus-1/system.d/
  or for testing: /etc/dbus-1/system.d/

  Policy for the dynamic-hibernate system-bus interface.

  The prepare/cleanup binary runs as root and broadcasts ErrorOccurred signals
  on the system bus. The user-session notifier needs permission to receive
  those signals. No well-known name is claimed — the root service broadcasts
  from its unique name only.
-->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Root service: allow sending signals on our interface -->
  <policy user="root">
    <allow send_interface="org.dynamic_hibernate.DynamicHibernate"/>
    <allow send_path="/org/dynamic_hibernate/DynamicHibernate"/>
  </policy>

  <!-- Any logged-in user: allow receiving (listening to) signals -->
  <policy context="default">
    <allow receive_interface="org.dynamic_hibernate.DynamicHibernate"
           receive_path="/org/dynamic_hibernate/DynamicHibernate"
           receive_member="ErrorOccurred"
           receive_type="signal"/>
  </policy>

</busconfig>
