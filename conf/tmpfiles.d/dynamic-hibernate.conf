#
# Install to: /etc/tmpfiles.d/
# Applied at boot by systemd-tmpfiles.
#
# ── image_size ────────────────────────────────────────────────────────────────
# Setting to 0 instructs the kernel to drop all reclaimable pages (clean
# page cache, reclaimable slab) before taking the hibernation snapshot.
# This minimises the must-save footprint that must fit in the swapfile.
# The prepare service also writes this value immediately before hibernate,
# but setting it here ensures it survives across sessions.
w    /sys/power/image_size                         -  -  -  -  0

# ── zswap ─────────────────────────────────────────────────────────────────────
# Enable zswap with a small pool (5 % of RAM = ~2 GB on 40 GB).
# Purpose: accumulate a real LZO compression ratio sample from live workload
# so the prepare service can estimate the compressed swapfile size at the
# s2idle→hibernate transition.
#
# writeback=0 : zswap compresses pages in RAM but never evicts to disk swap.
# This means it has zero impact on swap device lifetime between sessions.
w    /sys/module/zswap/parameters/enabled           -  -  -  -  1
w    /sys/module/zswap/parameters/max_pool_percent  -  -  -  -  5
w    /sys/module/zswap/parameters/compressor        -  -  -  -  lzo

# writeback lives under debugfs — write after debugfs is mounted.
# If this fails silently (path not yet available), the prepare service
# checks writeback status at runtime and warns.
w    /sys/kernel/debug/zswap/writeback              -  -  -  -  0
